# kyria.conf — feature flags for the converted keymap.
# Goes in:  <your-zmk-config>/config/kyria.conf

# --- Rotary encoders (EC11): one per half on the wireless board ---
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# --- Mouse / pointing emulation (BTN1/2/3, mouse move, scroll wheel) ---
CONFIG_ZMK_POINTING=y

# --- RGB underglow (drives the RGB_* keys on the ADJUST layer) ---
# The Kyria shield already defines the LED strip, so this compiles fine
# even if you never soldered LEDs (the keys just do nothing). Delete the
# line if you'd rather not carry the feature.
CONFIG_ZMK_RGB_UNDERGLOW=y

# --- Deep sleep for BLE battery life ---
CONFIG_ZMK_SLEEP=y
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000   # 15 minutes, in ms

# No OLED / display config — you're not running displays.

# kyria_rev3.conf - feature flags for the encoder Kyria (rev3). No underglow.

# --- Rotary encoders (EC11): one per half ---
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# --- Mouse / pointing emulation (BTN1/2/3, mouse move, scroll wheel) ---
CONFIG_ZMK_POINTING=y

# --- Deep sleep for BLE battery life ---
CONFIG_ZMK_SLEEP=y
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000   # 15 minutes, in ms

# RGB underglow is intentionally OFF. If you DO have underglow LEDs and want
# them, re-add both of these and the ADJUST-layer keys can go back to &rgb_ug:
#   CONFIG_ZMK_RGB_UNDERGLOW=y
#   CONFIG_WS2812_STRIP=y

# kyria_rev2.conf - the underglow Kyria (rev2.1). No encoders on this board.

# Mouse / pointing emulation (BTN1/2/3, mouse move, scroll wheel)
CONFIG_ZMK_POINTING=y

# RGB underglow ON, default to a rotating rainbow gradient ("swirl").
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3      # 0=solid 1=breathe 2=spectrum 3=swirl
# Cuts battery use a lot on wireless - turn LEDs off when idle:
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y

# Deep sleep for BLE battery life
CONFIG_ZMK_SLEEP=y

# EC11 encoders intentionally NOT enabled (this board has none).

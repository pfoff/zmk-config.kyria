# kyria_rev2.conf - the underglow Kyria (rev2.1). No encoders on this board.
# NOTE: Zephyr .conf has NO end-of-line comments. Every comment is on its own line,
# otherwise the text gets parsed as part of the value (and ZMK treats the resulting
# Kconfig warning as a fatal error).

# Mouse / pointing emulation (BTN1/2/3, mouse move, scroll wheel)
CONFIG_ZMK_POINTING=y

# RGB underglow ON. The WS2812 strip driver must be enabled explicitly alongside it.
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# Start lit, on a rotating rainbow gradient.
# Effect index: 0=solid, 1=breathe, 2=spectrum, 3=swirl
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3

# Cap brightness at 30% to save battery (this board is wireless).
# ZMK has no battery-only dimming, so this is a global ceiling: boots at 30% and
# the RGB brightness key can only go lower, never above 30%.
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=30
CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=30

# Turn the LEDs off when idle (saves a lot of battery on wireless).
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y

# Deep sleep for BLE battery life
CONFIG_ZMK_SLEEP=y

# Battery reporting over BLE. The host normally sees only the CENTRAL (left) half.
# FETCHING + PROXY also expose the peripheral (right) half, but the OS shows just
# one value - a helper app (e.g. zmk-battery-center) is needed to see both.
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_BT_BAS=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# EC11 encoders intentionally NOT enabled (this board has none).

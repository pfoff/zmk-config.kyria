# build.yaml — repo ROOT (next to config/). Encoders enabled in config/kyria_rev3.conf.
#
# BOARD: ZMK on Zephyr 4.1+ requires the "zmk" board variant suffix.
#   nice!nano v2 = nice_nano/nrf52840/zmk   (the nice_nano base defaults to the v2 revision)
#   Short form nice_nano//zmk also works. Plain "nice_nano" is rejected ("not set up for ZMK").
#
# SHIELDS: kyria_rev3_left / kyria_rev3_right (your wireless PCB is a rev3).
# Config files are named kyria_rev3.keymap / kyria_rev3.conf to match the shield base.
---
include:
  - board: nice_nano/nrf52840/zmk
    shield: kyria_rev3_left
  - board: nice_nano/nrf52840/zmk
    shield: kyria_rev3_right
